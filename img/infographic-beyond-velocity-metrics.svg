<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Inter', 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#022c22"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="520" fill="url(#bg2)" rx="16"/>
  
  <!-- Title -->
  <text x="40" y="40" fill="#f1f5f9" font-size="20" font-weight="700">Beyond Velocity: The 5 Metrics That Actually Matter</text>
  <text x="40" y="62" fill="#64748b" font-size="12">Based on DORA 2024 (39,000+ professionals) and Scrum.org Evidence-Based Management (May 2024)</text>
  
  <line x1="40" y1="78" x2="760" y2="78" stroke="#1e3a3a" stroke-width="1"/>
  
  <!-- Left: Velocity problem -->
  <rect x="40" y="92" width="220" height="180" rx="10" fill="#1a0a0a" stroke="#7f1d1d" stroke-width="1"/>
  <text x="60" y="118" fill="#ef4444" font-size="13" font-weight="700">VELOCITY</text>
  <text x="60" y="136" fill="#fca5a5" font-size="10" font-weight="600">Not in the Scrum Guide</text>
  
  <text x="60" y="162" fill="#94a3b8" font-size="10.5">&#x2717; Relative, not absolute</text>
  <text x="60" y="178" fill="#94a3b8" font-size="10.5">&#x2717; Creates perverse incentives</text>
  <text x="60" y="194" fill="#94a3b8" font-size="10.5">&#x2717; Measures output, not outcomes</text>
  <text x="60" y="210" fill="#94a3b8" font-size="10.5">&#x2717; AI makes it meaningless</text>
  
  <text x="60" y="238" fill="#fca5a5" font-size="9" font-style="italic">"50 → 5,000 in a sprint when AI</text>
  <text x="60" y="250" fill="#fca5a5" font-size="9" font-style="italic">generates code in seconds"</text>
  <text x="60" y="263" fill="#7f1d1d" font-size="8">— Scrum.org, February 2026</text>
  
  <!-- Arrow -->
  <text x="275" y="185" fill="#475569" font-size="24">→</text>
  
  <!-- Right: 5 metrics -->
  <rect x="310" y="92" width="450" height="56" rx="8" fill="#0a2920" stroke="#065f46" stroke-width="1"/>
  <circle cx="338" cy="120" r="14" fill="#059669"/>
  <text x="334" y="125" fill="#fff" font-size="13" font-weight="800">1</text>
  <text x="362" y="112" fill="#ecfdf5" font-size="13" font-weight="600">Deployment Frequency</text>
  <text x="362" y="128" fill="#6ee7b7" font-size="10">Elite: multiple deploys/day | Low: monthly to 6-monthly</text>
  <text x="362" y="141" fill="#475569" font-size="9">Source: DORA 2024 — strongest differentiator of performance</text>
  
  <rect x="310" y="158" width="450" height="56" rx="8" fill="#0a2920" stroke="#065f46" stroke-width="1"/>
  <circle cx="338" cy="186" r="14" fill="#059669"/>
  <text x="334" y="191" fill="#fff" font-size="13" font-weight="800">2</text>
  <text x="362" y="178" fill="#ecfdf5" font-size="13" font-weight="600">Cycle Time (Lead Time for Changes)</text>
  <text x="362" y="194" fill="#6ee7b7" font-size="10">Measures flow through system — exposes queues velocity hides</text>
  <text x="362" y="207" fill="#475569" font-size="9">Source: DORA key metric — code commit to production</text>
  
  <rect x="310" y="224" width="450" height="56" rx="8" fill="#0a2920" stroke="#065f46" stroke-width="1"/>
  <circle cx="338" cy="252" r="14" fill="#059669"/>
  <text x="334" y="257" fill="#fff" font-size="13" font-weight="800">3</text>
  <text x="362" y="244" fill="#ecfdf5" font-size="13" font-weight="600">Sprint Goal Achievement Rate</text>
  <text x="362" y="260" fill="#6ee7b7" font-size="10">Outcome-based: did we achieve the goal, not did we finish stories?</text>
  <text x="362" y="273" fill="#475569" font-size="9">Source: Scrum Guide 2020 — Sprint Goal as Sprint Backlog commitment</text>
  
  <rect x="310" y="290" width="450" height="56" rx="8" fill="#0a2920" stroke="#065f46" stroke-width="1"/>
  <circle cx="338" cy="318" r="14" fill="#059669"/>
  <text x="334" y="323" fill="#fff" font-size="13" font-weight="800">4</text>
  <text x="362" y="310" fill="#ecfdf5" font-size="13" font-weight="600">Change Failure Rate</text>
  <text x="362" y="326" fill="#6ee7b7" font-size="10">% of deploys requiring rollback/hotfix — stability metric</text>
  <text x="362" y="339" fill="#475569" font-size="9">Source: DORA 2024 — medium cluster beat high cluster for first time</text>
  
  <rect x="310" y="356" width="450" height="56" rx="8" fill="#0a2920" stroke="#065f46" stroke-width="1"/>
  <circle cx="338" cy="384" r="14" fill="#059669"/>
  <text x="334" y="389" fill="#fff" font-size="13" font-weight="800">5</text>
  <text x="362" y="376" fill="#ecfdf5" font-size="13" font-weight="600">Unrealised Value (Customer Satisfaction Gap)</text>
  <text x="362" y="392" fill="#6ee7b7" font-size="10">Gap between what customers desire and what they experience</text>
  <text x="362" y="405" fill="#475569" font-size="9">Source: Scrum.org EBM Guide 2024 — 4 Key Value Areas framework</text>
  
  <!-- DORA cluster warning -->
  <rect x="40" y="290" width="220" height="124" rx="10" fill="#1a1500" stroke="#78350f" stroke-width="1"/>
  <text x="60" y="314" fill="#fbbf24" font-size="11" font-weight="700">DORA 2024 WARNING</text>
  <text x="60" y="334" fill="#fde68a" font-size="10">Low performers grew:</text>
  <text x="60" y="350" fill="#fbbf24" font-size="16" font-weight="800">17% → 25%</text>
  <text x="60" y="370" fill="#fde68a" font-size="10">High performers shrank:</text>
  <text x="60" y="386" fill="#fbbf24" font-size="16" font-weight="800">31% → 22%</text>
  <text x="60" y="406" fill="#78350f" font-size="8">The performance gap is widening</text>
  
  <!-- Bottom -->
  <rect x="0" y="430" width="800" height="90" fill="#020c07" rx="0"/>
  <text x="40" y="458" fill="#64748b" font-size="10" font-weight="600" letter-spacing="0.5">SOURCES</text>
  <text x="40" y="476" fill="#475569" font-size="10">DORA "2024 Accelerate State of DevOps Report" — 39,000+ professionals, decade of data (dora.dev)</text>
  <text x="40" y="490" fill="#475569" font-size="10">Scrum.org "Evidence-Based Management Guide" — Updated May 2024 | Scrum Guide (2020) — scrumguides.org</text>
  <text x="40" y="504" fill="#475569" font-size="10">Scrum.org "From Velocity to Agent Efficiency" — February 2026 | EasyRetro platform statistics</text>
  
  <rect x="640" y="448" width="120" height="28" rx="6" fill="#0a2920" stroke="#065f46" stroke-width="1"/>
  <text x="660" y="466" fill="#6ee7b7" font-size="11" font-weight="600">agilityops.com.au</text>
</svg>
