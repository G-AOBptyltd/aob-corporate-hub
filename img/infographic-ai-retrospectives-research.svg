<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Inter', 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1629"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="520" fill="url(#bg3)" rx="16"/>
  
  <!-- Title -->
  <text x="40" y="40" fill="#f1f5f9" font-size="20" font-weight="700">AI in Retrospectives: The Research Evidence</text>
  <text x="40" y="62" fill="#64748b" font-size="12">What Harvard, DORA, and the agile community tell us about AI-augmented team improvement</text>
  
  <line x1="40" y1="78" x2="760" y2="78" stroke="#334155" stroke-width="1"/>
  
  <!-- Left column: The Problem -->
  <text x="40" y="104" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">THE PROBLEM</text>
  
  <rect x="40" y="116" width="340" height="86" rx="10" fill="#1e0a0a" stroke="#7f1d1d" stroke-width="1"/>
  <text x="62" y="142" fill="#ef4444" font-size="34" font-weight="800">0.33%</text>
  <text x="62" y="162" fill="#fca5a5" font-size="12">Average action item completion rate</text>
  <text x="62" y="178" fill="#fca5a5" font-size="12">across retrospective meetings</text>
  <text x="62" y="194" fill="#7f1d1d" font-size="9">EasyRetro platform data — 100+ countries</text>
  
  <!-- Easy Agile comparison -->
  <rect x="40" y="212" width="160" height="60" rx="8" fill="#1a1500" stroke="#78350f" stroke-width="1"/>
  <text x="56" y="234" fill="#fbbf24" font-size="18" font-weight="800">40-50%</text>
  <text x="56" y="250" fill="#fde68a" font-size="9">Before tracking features</text>
  <text x="56" y="264" fill="#78350f" font-size="8">Easy Agile TeamRhythm</text>
  
  <text x="210" y="244" fill="#475569" font-size="20">→</text>
  
  <rect x="230" y="212" width="150" height="60" rx="8" fill="#0a2920" stroke="#065f46" stroke-width="1"/>
  <text x="246" y="234" fill="#10b981" font-size="18" font-weight="800">65%</text>
  <text x="246" y="250" fill="#6ee7b7" font-size="9">After tracking features</text>
  <text x="246" y="264" fill="#065f46" font-size="8">Visibility drives accountability</text>
  
  <!-- Right column: Harvard study -->
  <text x="420" y="104" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">HARVARD P&amp;G STUDY (MARCH 2025)</text>
  
  <rect x="420" y="116" width="340" height="158" rx="10" fill="#0c1a33" stroke="#1d4ed8" stroke-width="1"/>
  <text x="442" y="140" fill="#93c5fd" font-size="11" font-weight="600">776 professionals | Pre-registered RCT</text>
  <text x="442" y="156" fill="#60a5fa" font-size="10">Dell'Acqua et al. — HBS, Wharton, ESSEC, P&amp;G</text>
  
  <rect x="442" y="168" width="296" height="30" rx="6" fill="#1e3a5f"/>
  <text x="456" y="188" fill="#93c5fd" font-size="11">AI individuals = 2-person teams without AI</text>
  
  <rect x="442" y="204" width="296" height="30" rx="6" fill="#1e3a5f"/>
  <text x="456" y="224" fill="#93c5fd" font-size="11">AI broke R&amp;D / Commercial functional silos</text>
  
  <rect x="442" y="240" width="296" height="26" rx="6" fill="#1e3a5f"/>
  <text x="456" y="258" fill="#93c5fd" font-size="11">12-16% faster | Higher positive emotions</text>
  
  <!-- DORA Warning -->
  <text x="40" y="304" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">DORA 2024 AI WARNING</text>
  
  <rect x="40" y="316" width="340" height="104" rx="10" fill="#1a1500" stroke="#d97706" stroke-width="1.5"/>
  <text x="62" y="342" fill="#fbbf24" font-size="11" font-weight="700">AI adoption accompanied by:</text>
  
  <text x="62" y="366" fill="#fde68a" font-size="22" font-weight="800">-1.5%</text>
  <text x="152" y="366" fill="#fde68a" font-size="12">delivery throughput</text>
  
  <text x="62" y="394" fill="#fde68a" font-size="22" font-weight="800">-7.2%</text>
  <text x="152" y="394" fill="#fde68a" font-size="12">delivery stability</text>
  
  <text x="62" y="414" fill="#92400e" font-size="9" font-weight="600">39% report little/no trust in AI-generated code</text>
  
  <!-- Where AI Helps -->
  <text x="420" y="304" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">WHERE AI ADDS GENUINE VALUE</text>
  
  <rect x="420" y="316" width="340" height="104" rx="10" fill="#0c1a33" stroke="#1d4ed8" stroke-width="1"/>
  
  <circle cx="444" cy="340" r="8" fill="#2563eb"/>
  <text x="441" y="344" fill="#fff" font-size="9" font-weight="800">1</text>
  <text x="460" y="344" fill="#93c5fd" font-size="12">Pattern detection across sprints</text>
  
  <circle cx="444" cy="364" r="8" fill="#2563eb"/>
  <text x="441" y="368" fill="#fff" font-size="9" font-weight="800">2</text>
  <text x="460" y="368" fill="#93c5fd" font-size="12">Sentiment analysis of team comms</text>
  
  <circle cx="444" cy="388" r="8" fill="#2563eb"/>
  <text x="441" y="392" fill="#fff" font-size="9" font-weight="800">3</text>
  <text x="460" y="392" fill="#93c5fd" font-size="12">Action item tracking &amp; accountability</text>
  
  <circle cx="444" cy="412" r="8" fill="#2563eb"/>
  <text x="441" y="416" fill="#fff" font-size="9" font-weight="800">4</text>
  <text x="460" y="416" fill="#93c5fd" font-size="12">Sprint pre-analysis &amp; preparation</text>
  
  <!-- Bottom bar -->
  <rect x="0" y="436" width="800" height="84" fill="#060c18" rx="0"/>
  
  <!-- Key principle -->
  <rect x="40" y="448" width="480" height="28" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="56" y="466" fill="#f1f5f9" font-size="11" font-weight="600">"Expertise + AI = competitive advantage. AI without expertise = expensive noise."</text>
  <text x="40" y="492" fill="#475569" font-size="9">— Scrum.org, "The Agile AI Manifesto"</text>
  
  <text x="40" y="510" fill="#475569" font-size="9">Sources: Harvard Business School WP 25-043 | DORA 2024 Accelerate Report | EasyRetro | Easy Agile | Scrum.org | MDPI Applied Sciences 2025</text>
  
  <rect x="640" y="448" width="120" height="28" rx="6" fill="#0c1a33" stroke="#1d4ed8" stroke-width="1"/>
  <text x="656" y="466" fill="#93c5fd" font-size="11" font-weight="600">agilityops.com.au</text>
</svg>
